name: Flutter Web Deploy

on:
  push:
    branches:
      - main

# GitHub Pages 배포를 위한 권한 설정
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
      # 1. 깃허브 코드 내려받기
      - name: Checkout 코드가져오기
        uses: actions/checkout@v4

      # 2. 플러터 세팅하기
      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 3. 플러터 패키지 다운받기 (폴더명 주의)
      - name: 패키지 설치
        working-directory: ./Meogeoyori
        run: flutter pub get

      # 4. 웹 전용으로 빌드하기 (base-href 필수! 깃허브 레포지토리 이름으로 설정)
      - name: 웹 빌드
        working-directory: ./Meogeoyori
        run: flutter build web --base-href "/Project-Meogeoyori/"

      # 5. 완성된 web 폴더를 깃허브 페이지로 업로드 준비
      - name: 업로드 준비
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./Meogeoyori/build/web

      # 6. 실제 깃허브 페이지로 발행
      - name: Pages에 배포
        id: deployment
        uses: actions/deploy-pages@v4
